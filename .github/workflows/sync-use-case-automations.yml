name: Sync Use-Case Automations

on:
  pull_request:
    branches:
      - '**'
    paths:
      - 'openhands/usage/automations/overview.mdx'
      - 'openhands/usage/use-cases/**'
      - '.github/scripts/sync_use_case_automations.py'
      - '.github/workflows/sync-use-case-automations.yml'

permissions:
  contents: read

jobs:
  check-sync:
    name: Check use-case ↔ automation sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate sync
        run: python .github/scripts/sync_use_case_automations.py --check
