name: Check Broken Links

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main
  schedule:
    # Run weekly on Monday at 9 AM UTC to catch links that break over time
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      check_external:
        description: 'Also check external links (slower)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  check-internal-links:
    name: Check Internal Links (Mintlify)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mint CLI
        run: npm install -g mint@latest

      - name: Check for broken internal links
        run: |
          echo "Running Mintlify broken link detection..."
          # mint broken-links flags links to auto-generated OpenAPI pages as broken
          # because they don't exist as physical .mdx files. We filter those out
          # using a Python script for reliable Unicode handling.
          set +e
          OUTPUT=$(mint broken-links 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ No broken internal links found!"
            exit 0
          fi

          # Use Python to filter out OpenAPI-generated paths (handles Unicode reliably)
          echo "$OUTPUT" | python3 -c "
          import sys

          # Directories where OpenAPI pages are auto-generated by Mintlify
          OPENAPI_PREFIXES = [
              '/sdk/guides/agent-server/api-reference/',
              '/openhands/usage/v0/rest-api/',
          ]

          lines = sys.stdin.read().splitlines()
          real_broken = []
          for line in lines:
              # Broken link lines contain the ⎿ character
              if '⎿' in line:
                  path = line.strip().lstrip('⎿').strip()
                  if any(path.startswith(p) for p in OPENAPI_PREFIXES):
                      continue
              real_broken.append(line)

          # Check if any real broken links remain
          has_broken = any('⎿' in l for l in real_broken)
          if has_broken:
              print('Found broken links (excluding auto-generated OpenAPI pages):')
              print('\n'.join(real_broken))
              sys.exit(1)
          else:
              print('✓ No broken internal links found! (OpenAPI-generated page links excluded)')
              sys.exit(0)
          "

  check-external-links:
    name: Check External Links
    runs-on: ubuntu-latest
    # Run on schedule or when manually triggered with check_external=true
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.check_external == true)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check external links
        run: |
          echo "Running external link checker..."
          python .github/scripts/check_external_links.py --verbose
        continue-on-error: true  # Don't fail the workflow on timeouts

      - name: Summary
        if: always()
        run: |
          echo "External link check complete."
          echo "Note: Some links may timeout due to rate limiting or slow servers."
          echo "HTTP 403 errors from Cloudflare-protected sites are expected and skipped."
