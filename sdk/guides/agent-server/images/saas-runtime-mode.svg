<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Orchestrator box -->
  <rect x="40" y="20" width="520" height="80" rx="8" ry="8" fill="#f0f4f8" stroke="#94a3b8" stroke-width="2"/>
  <text x="300" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#334155">Your Orchestrator</text>
  <text x="300" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">(CI, scheduler, or parent agent)</text>
  <text x="300" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Creates sandbox, uploads script, triggers execution</text>
  
  <!-- Arrow -->
  <line x1="300" y1="100" x2="300" y2="145" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Cloud Sandbox outer box -->
  <rect x="40" y="155" width="520" height="165" rx="8" ry="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="300" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#065f46">OpenHands Cloud Sandbox</text>
  
  <!-- Inner SDK script box -->
  <rect x="70" y="195" width="460" height="110" rx="6" ry="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="300" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#334155">Your SDK script</text>
  <text x="300" y="240" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#7c3aed">(saas_runtime_mode=True)</text>
  
  <!-- Bullet points -->
  <circle cx="120" cy="262" r="3" fill="#10b981"/>
  <text x="132" y="266" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Connects to local agent-server</text>
  
  <circle cx="120" cy="280" r="3" fill="#10b981"/>
  <text x="132" y="284" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Inherits LLM/secrets from Cloud account</text>
  
  <circle cx="120" cy="298" r="3" fill="#10b981"/>
  <text x="132" y="302" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Sends callback on completion</text>
</svg>
