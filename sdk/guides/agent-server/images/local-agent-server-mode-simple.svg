<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160">
  <!-- Cloud Sandbox outer box -->
  <rect x="20" y="20" width="460" height="120" rx="8" ry="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="250" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#065f46">OpenHands Cloud Sandbox</text>
  
  <!-- Inner SDK script box -->
  <rect x="50" y="60" width="400" height="65" rx="6" ry="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="250" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#334155">Your SDK script</text>
  <text x="250" y="103" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#7c3aed">(local_agent_server_mode=True)</text>
  
  <!-- Bullet points -->
  <circle cx="100" cy="118" r="2.5" fill="#10b981"/>
  <text x="110" y="122" font-family="system-ui, sans-serif" font-size="10" fill="#475569">connects to localhost:60000</text>
  
  <circle cx="280" cy="118" r="2.5" fill="#10b981"/>
  <text x="290" y="122" font-family="system-ui, sans-serif" font-size="10" fill="#475569">agent-server already running</text>
</svg>
