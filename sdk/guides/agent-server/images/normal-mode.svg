<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 120">
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Your Machine box -->
  <rect x="20" y="20" width="180" height="80" rx="8" ry="8" fill="#f0f4f8" stroke="#94a3b8" stroke-width="2"/>
  <text x="110" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#334155">Your Machine</text>
  <text x="110" y="74" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">(SDK script)</text>
  
  <!-- Double arrow with API label -->
  <line x1="210" y1="60" x2="260" y2="60" stroke="#666" stroke-width="2" marker-end="url(#arrowRight)"/>
  <line x1="340" y1="60" x2="290" y2="60" stroke="#666" stroke-width="2" marker-end="url(#arrowRight)"/>
  <text x="275" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">API</text>
  
  <!-- OpenHands Cloud box -->
  <rect x="350" y="20" width="180" height="80" rx="8" ry="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="440" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#065f46">OpenHands Cloud</text>
  <text x="440" y="74" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">(provisions sandbox)</text>
</svg>
