<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1280" viewBox="0 0 2048 1280" role="img" aria-labelledby="title desc">
  <title id="title">OpenHands Add LLM Profile settings for LiteLLM proxy</title>
  <desc id="desc">Dark-mode OpenHands settings screen showing an LLM profile configured with litellm_proxy/minimax/minimax-m3, a base URL, and API key field.</desc>
  <rect width="2048" height="1280" fill="#1c1d1f"/>

  <rect x="0" y="0" width="470" height="1280" fill="#181819"/>
  <text x="18" y="54" fill="#ececec" font-size="36" font-family="Arial, Helvetica, sans-serif">Settings</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#b2b2b4">
    <circle cx="46" cy="118" r="10" fill="none" stroke="#b2b2b4" stroke-width="2"/>
    <text x="82" y="126">Agent</text>

    <rect x="18" y="158" width="412" height="56" rx="12" fill="#373739"/>
    <circle cx="46" cy="186" r="10" fill="none" stroke="#ececec" stroke-width="2"/>
    <text x="82" y="194" fill="#ececec">LLM</text>

    <circle cx="46" cy="258" r="10" fill="none" stroke="#b2b2b4" stroke-width="2"/>
    <text x="82" y="266">Condenser</text>

    <circle cx="46" cy="328" r="10" fill="none" stroke="#b2b2b4" stroke-width="2"/>
    <text x="82" y="336">Verification</text>

    <circle cx="46" cy="428" r="10" fill="none" stroke="#b2b2b4" stroke-width="2"/>
    <text x="82" y="436">Application</text>

    <circle cx="46" cy="498" r="10" fill="none" stroke="#b2b2b4" stroke-width="2"/>
    <text x="82" y="506">Secrets</text>
  </g>

  <text x="32" y="560" fill="#919193" font-size="20" font-family="Arial, Helvetica, sans-serif">These settings are synced from Local</text>
  <text x="32" y="598" fill="#919193" font-size="20" font-family="Arial, Helvetica, sans-serif">backend (http://127.0.0.1:18000)</text>

  <text x="610" y="52" fill="#b2b2b4" font-size="32" font-family="Arial, Helvetica, sans-serif">←  Back</text>
  <text x="590" y="128" fill="#ececec" font-size="58" font-weight="700" font-family="Arial, Helvetica, sans-serif">Add LLM Profile</text>
  <text x="590" y="176" fill="#b2b2b4" font-size="28" font-family="Arial, Helvetica, sans-serif">Configure your LLM settings below, then click Save to create this profile.</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="590" y="266" fill="#ececec" font-size="28">Profile Name</text>
    <rect x="590" y="295" width="1460" height="62" rx="14" fill="#252526" stroke="#4e4e50" stroke-width="2"/>
    <text x="612" y="336" fill="#ececec" font-size="32">minimax-m3</text>
    <text x="590" y="400" fill="#919193" font-size="20">Profile name must start with a letter or digit, and contain only letters, digits, dots, underscores, or hyphens (max 64 characters)</text>

    <text x="608" y="488" fill="#919193" font-size="28">Basic</text>
    <text x="738" y="488" fill="#ececec" font-size="28">Advanced</text>
    <text x="868" y="488" fill="#919193" font-size="28">All</text>
    <line x1="720" y1="508" x2="830" y2="508" stroke="#ececec" stroke-width="4"/>

    <text x="590" y="592" fill="#ececec" font-size="28">Custom Model</text>
    <rect x="590" y="612" width="1460" height="62" rx="14" fill="#252526" stroke="#4e4e50" stroke-width="2"/>
    <text x="612" y="653" fill="#ececec" font-size="28">litellm_proxy/minimax/minimax-m3</text>

    <text x="590" y="755" fill="#ececec" font-size="28">Base URL</text>
    <rect x="590" y="775" width="1460" height="62" rx="14" fill="#252526" stroke="#4e4e50" stroke-width="2"/>
    <text x="612" y="816" fill="#dcdcdc" font-size="28">https://your-litellm-proxy.com</text>

    <text x="590" y="920" fill="#ececec" font-size="28">API Key</text>
    <rect x="590" y="940" width="1460" height="62" rx="14" fill="#252526" stroke="#4e4e50" stroke-width="2"/>

    <text x="590" y="1068" fill="#dcdcdc" font-size="22">Don't know your API key? </text>
    <text x="848" y="1068" fill="#dcdcdc" font-size="22" text-decoration="underline">Click here for instructions</text>

    <rect x="590" y="1160" width="125" height="64" rx="16" fill="#212225" stroke="#4e4e50" stroke-width="2"/>
    <text x="615" y="1202" fill="#ececec" font-size="28">Cancel</text>

    <rect x="740" y="1160" width="105" height="64" rx="16" fill="#6f643b"/>
    <text x="764" y="1202" fill="#2b2b2b" font-size="28">Save</text>
  </g>
</svg>
